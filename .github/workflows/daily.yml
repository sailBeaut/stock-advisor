name: Daily Pipeline

on:
  # Runs every weekday (Mon–Fri) at 22:30 UTC = ~5:30pm ET = market close + 30 min
  schedule:
    - cron: '30 22 * * 1-5'
  # Allows manual trigger from the GitHub UI for testing
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write   # needed to commit the updated DB back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily pipeline
        env:
          FRED_API_KEY:    ${{ secrets.FRED_API_KEY }}
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          NEWSAPI_KEY:     ${{ secrets.NEWSAPI_KEY }}
        run: |
          python daily_pipeline.py

      - name: Commit updated database & signals
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add trading.db trading.db-wal trading.db-shm 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Daily pipeline run $(date -u +%Y-%m-%d)"
          git push
