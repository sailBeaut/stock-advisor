name: Daily Pipeline

on:
  schedule:
    # Weekdays at 22:30 UTC (after US market close)
    - cron: '30 22 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      USE_R2_DB: "true"
      ENDPOINTS_FOR_S3_CLIENTS: ${{ secrets.ENDPOINTS_FOR_S3_CLIENTS }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      SECRET_ACCESS_KEY: ${{ secrets.SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily pipeline (downloads DB from R2, runs ML, uploads DB to R2)
        run: python daily_pipeline.py

      - name: Confirm R2 upload happened
        run: |
          python -c "
          from r2_client import get_remote_lastmod
          from datetime import datetime, timezone, timedelta
          ts = get_remote_lastmod()
          assert ts is not None, 'R2 lastmod marker missing after pipeline'
          age = datetime.now(timezone.utc) - datetime.fromisoformat(ts)
          assert age < timedelta(minutes=5), f'R2 marker too old: {age}'
          print('R2 confirmed fresh, age:', age)
          "
